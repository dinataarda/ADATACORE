<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manajemen Log</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --text: #e0e0e0;
            --muted: #888;
            --primary: #00bfff;
            --personal: #00bfff;
            --work: #ffaa00;
            --secret: #ff5555;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding-bottom: 80px;
            overflow-x: hidden;
        }
        header {
            background: #111;
            padding: 16px 20px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
        }
        .composer {
            background: var(--surface);
            margin: 15px;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #222;
        }
        .comp-top {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .chip {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #333;
        }
        .chip.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }
        textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 16px;
            min-height: 80px;
            resize: none;
            font-family: inherit;
            line-height: 1.6;
        }
        .composer-foot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 14px;
            color: var(--muted);
        }
        button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .filters {
            padding: 0 15px 10px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .filter-btn {
            padding: 7px 18px;
            background: var(--surface);
            border: 1px solid #333;
            color: var(--muted);
            border-radius: 20px;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
        }
        .filter-btn.active {
            background: var(--primary);
            color: #000;
        }

        .search-box {
            margin: 0 15px 10px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            background: var(--surface);
            border: 1px solid #333;
            padding: 12px 16px 12px 45px;
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
        }
        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
        }

        .notes-list {
            padding: 0 15px;
        }
        .note-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #222;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s;
        }
        .note-card.swiping { transform: translateX(-100px); }

        .note-category {
            font-size: 12px;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .note-personal { background:#002b44; color:var(--personal); }
        .note-work     { background:#3a2a00; color:var(--work); }
        .note-secret   { background:#3a0000; color:var(--secret); }

        .note-text {
            font-size: 15.5px;
            white-space: pre-wrap;
            margin: 8px 0 12px;
        }
        .note-time {
            font-size: 12px;
            color: var(--muted);
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
        }
        .nav-item {
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            cursor: pointer;
        }
        .nav-item.active { color: var(--primary); }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: flex-end;
            z-index: 200;
        }
        .modal-content {
            background: #1a1a1a;
            width: 100%;
            max-width: 480px;
            border-radius: 20px 20px 0 0;
            padding: 25px;
        }
    </style>
</head>
<body>

    <header>
        <div>Manajemen Log</div>
        <div style="display:flex; gap:8px;">
            <button onclick="showStats()">Stats</button>
            <button onclick="exportData()">Backup</button>
        </div>
    </header>

    <!-- Composer -->
    <div class="composer">
        <div class="comp-top" id="category-chips">
            <div class="chip active" data-cat="Personal" onclick="selectCategory(this)">Personal</div>
            <div class="chip" data-cat="Work" onclick="selectCategory(this)">Work</div>
            <div class="chip" data-cat="Secret" onclick="selectCategory(this)">Secret</div>
        </div>
        <textarea id="note-txt" placeholder="Tulis log di sini..." oninput="autoResize(this)"></textarea>
        <div class="composer-foot">
            <span id="char-ct">0 karakter</span>
            <button onclick="saveEntry()">Simpan Log</button>
        </div>
    </div>

    <!-- Search -->
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="search-in" placeholder="Cari log..." oninput="renderLogs()">
    </div>

    <!-- Filters -->
    <div class="filters" id="filters">
        <div class="filter-btn active" data-f="All" onclick="setFilter(this)">Semua <span id="count-all">0</span></div>
        <div class="filter-btn" data-f="Personal" onclick="setFilter(this)">Personal <span id="count-p">0</span></div>
        <div class="filter-btn" data-f="Work" onclick="setFilter(this)">Work <span id="count-w">0</span></div>
        <div class="filter-btn" data-f="Secret" onclick="setFilter(this)">Secret <span id="count-s">0</span></div>
    </div>

    <!-- Logs List -->
    <div class="notes-list" id="logs-list"></div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
        <div class="nav-item active"><i class="fas fa-list"></i><div>Logs</div></div>
        <div class="nav-item" onclick="document.getElementById('import-file').click()"><i class="fas fa-upload"></i><div>Restore</div></div>
    </div>

    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Stats Modal -->
    <div class="modal" id="stats-modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; color:var(--primary);">Vault Statistics</h2>
            <div style="display:flex; justify-content:space-between; margin:15px 0;">
                <span>Total Log</span>
                <span id="stat-total" style="color:var(--primary); font-weight:700;">0</span>
            </div>
            <div style="display:flex; justify-content:space-between; margin:15px 0;">
                <span>Ukuran Penyimpanan</span>
                <span id="stat-size">0 B</span>
            </div>
            <div style="margin-top:30px; display:flex; gap:12px;">
                <button onclick="clearAll()" style="flex:1; background:#ff5555; color:white;">Hapus Semua</button>
                <button onclick="closeStats()" style="flex:1;">Tutup</button>
            </div>
        </div>
    </div>

<script>
// ==================== CONFIG ====================
const DB_NAME = "adv3_db";
let currentFilter = "All";
let currentCategory = "Personal";

// ==================== DATABASE ====================
const getDB = () => JSON.parse(localStorage.getItem(DB_NAME) || "[]");
const saveDB = (data) => localStorage.setItem(DB_NAME, JSON.stringify(data));

function uid() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
}

function fmtTime(ts) {
    return new Date(ts).toLocaleString('id-ID', { 
        day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' 
    });
}

// ==================== CATEGORY ====================
function selectCategory(el) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    currentCategory = el.dataset.cat;
}

// ==================== AUTO RESIZE TEXTAREA ====================
function autoResize(textarea) {
    textarea.style.height = 'auto';
    textarea.style.height = textarea.scrollHeight + 'px';
    document.getElementById('char-ct').textContent = `${textarea.value.length} karakter`;
}

// ==================== SAVE ====================
function saveEntry() {
    const ta = document.getElementById("note-txt");
    const txt = ta.value.trim();
    if (!txt) return;

    const db = getDB();
    db.unshift({
        id: uid(),
        content: txt,
        cat: currentCategory,
        ts: Date.now(),
        time: fmtTime(Date.now())
    });
    saveDB(db);
    ta.value = "";
    autoResize(ta);
    renderLogs();
    updateCounters();
    toast("Log berhasil disimpan");
}

// ==================== RENDER LOGS ====================
function renderLogs() {
    const db = getDB();
    const container = document.getElementById("logs-list");
    const query = document.getElementById("search-in").value.toLowerCase().trim();

    let items = currentFilter === "All" ? db : db.filter(item => item.cat === currentFilter);
    if (query) items = items.filter(item => item.content.toLowerCase().includes(query));

    if (items.length === 0) {
        container.innerHTML = `<p style="text-align:center; color:#666; padding:60px 20px;">Tidak ada log ditemukan</p>`;
        return;
    }

    container.innerHTML = items.map(item => `
        <div class="note-card" data-id="${item.id}" ontouchstart="startSwipe(this, event)" ontouchend="endSwipe(this)">
            <div class="note-category note-\( {item.cat.toLowerCase()}"> \){item.cat}</div>
            <div class="note-text">${item.content.replace(/\n/g, '<br>')}</div>
            <div class="note-time">${item.time}</div>
            <div style="position:absolute; top:16px; right:16px; display:flex; gap:12px; color:#666;">
                <i class="fas fa-copy" onclick="copyEntry('${item.id}'); event.stopImmediatePropagation()" style="cursor:pointer;"></i>
                <i class="fas fa-edit" onclick="editEntry('${item.id}'); event.stopImmediatePropagation()" style="cursor:pointer;"></i>
                <i class="fas fa-trash-alt" onclick="deleteEntry('${item.id}'); event.stopImmediatePropagation()" style="cursor:pointer; color:#ff5555;"></i>
            </div>
        </div>
    `).join("");
}

// ==================== SWIPE TO DELETE ====================
let swipeStartX = 0;
function startSwipe(card, e) {
    swipeStartX = e.touches[0].clientX;
    card.classList.remove('swiping');
}
function endSwipe(card) {
    const diff = swipeStartX - event.changedTouches[0].clientX;
    if (diff > 120) {
        card.classList.add('swiping');
        setTimeout(() => {
            deleteEntry(card.dataset.id);
        }, 300);
    }
}

// ==================== CRUD ====================
function copyEntry(id) {
    const db = getDB();
    const item = db.find(x => x.id === id);
    if (item) {
        navigator.clipboard.writeText(item.content).then(() => toast("Disalin ke clipboard"));
    }
}

function editEntry(id) {
    const db = getDB();
    const item = db.find(x => x.id === id);
    if (!item) return;

    const newContent = prompt("Edit log:", item.content);
    if (newContent === null || newContent.trim() === "") return;

    item.content = newContent.trim();
    saveDB(db);
    renderLogs();
    toast("Log berhasil diedit");
}

function deleteEntry(id) {
    if (!confirm("Hapus log ini?")) return;
    let db = getDB();
    db = db.filter(x => x.id !== id);
    saveDB(db);
    renderLogs();
    updateCounters();
    toast("Log dihapus");
}

// ==================== FILTER & COUNTERS ====================
function setFilter(el) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentFilter = el.dataset.f;
    renderLogs();
}

function updateCounters() {
    const db = getDB();
    document.getElementById('count-all').textContent = db.length;
    document.getElementById('count-p').textContent = db.filter(x => x.cat === "Personal").length;
    document.getElementById('count-w').textContent = db.filter(x => x.cat === "Work").length;
    document.getElementById('count-s').textContent = db.filter(x => x.cat === "Secret").length;
}

// ==================== BACKUP & RESTORE ====================
function exportData() {
    const db = getDB();
    if (!db.length) return toast("Tidak ada data untuk dibackup");

    const blob = new Blob([JSON.stringify(db, null, 2)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `manajemen_log_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    toast("Backup berhasil diunduh");
}

function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            const imported = JSON.parse(ev.target.result);
            if (!Array.isArray(imported)) throw new Error();

            let db = getDB();
            const existingIds = new Set(db.map(item => item.id));
            const newItems = imported.filter(item => !existingIds.has(item.id));

            db = [...newItems, ...db];
            saveDB(db);
            renderLogs();
            updateCounters();
            toast(`${newItems.length} log baru berhasil di-import`);
        } catch(err) {
            toast("File tidak valid");
        }
    };
    reader.readAsText(file);
}

// ==================== STATISTICS ====================
function showStats() {
    const db = getDB();
    document.getElementById("stat-total").textContent = db.length;
    const size = new Blob([localStorage.getItem(DB_NAME) || ""]).size;
    document.getElementById("stat-size").textContent = size + " B";
    document.getElementById("stats-modal").style.display = "flex";
}

function closeStats() {
    document.getElementById("stats-modal").style.display = "none";
}

function clearAll() {
    if (confirm("Hapus SEMUA log? Tindakan ini tidak dapat dibatalkan!")) {
        localStorage.removeItem(DB_NAME);
        renderLogs();
        updateCounters();
        closeStats();
        toast("Semua log telah dihapus");
    }
}

// ==================== TOAST ====================
function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2200);
}

// ==================== INIT ====================
window.onload = () => {
    renderLogs();
    updateCounters();

    // Auto resize textarea saat load
    const ta = document.getElementById("note-txt");
    ta.addEventListener("input", () => autoResize(ta));
};
</script>
</body>
                </html>
