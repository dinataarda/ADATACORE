<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyNotes Pro - Enhanced</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-body: #000000;
            --bg-card: #121212;
            --accent: #007aff; 
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --border: #27272a;
            --danger-red: #ff453a; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-body); color: var(--text-main); padding: 15px; overflow-x: hidden; }
        .container { max-width: 450px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-top: 10px; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .head-btns { display: flex; gap: 8px; }
        
        .icon-btn-head { 
            background: #1a1a1a; border: 1px solid var(--border); width: 40px; height: 40px; 
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: white; cursor: pointer; position: relative; transition: 0.2s;
        }
        .icon-btn-head input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        .icon-btn-head:active { transform: scale(0.9); }

        .input-card { 
            background: var(--bg-card); border-radius: 24px; padding: 20px; margin-bottom: 25px; 
            border: 2px solid var(--accent);
        }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { 
            background: #262626; border: none; color: #888; padding: 8px 18px; 
            border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .tab-btn.active { background: var(--accent); color: white; }

        textarea { 
            background: transparent; border: none; width: 100%; height: 80px; 
            color: white; font-size: 18px; outline: none; resize: none;
        }
        
        .input-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222; padding-top: 15px; margin-top: 10px;}
        .save-btn { background: var(--accent); color: white; border: none; padding: 10px 28px; border-radius: 22px; font-weight: 700; cursor: pointer; }

        .search-box { 
            background: var(--bg-card); border-radius: 18px; display: flex; align-items: center; 
            padding: 0 15px; margin-bottom: 20px; border: 1px solid var(--border);
        }
        .search-input { flex: 1; background: transparent; border: none; padding: 14px 0; color: white; outline: none; margin-left: 10px; }
        
        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        
        /* PIL STYLE DENGAN COUNTER */
        .pill { 
            background: #1a1a1a; border: 1px solid var(--border); color: var(--text-dim); 
            padding: 8px 16px; border-radius: 25px; white-space: nowrap; cursor: pointer;
            display: flex; align-items: center; gap: 6px; font-size: 14px; transition: 0.2s;
        }
        .pill.active { background: var(--accent); color: white; border-color: var(--accent); }
        .pill span { 
            background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700;
        }
        .pill.active span { background: rgba(0,0,0,0.2); }

        .note-item { 
            background: var(--bg-card); border-radius: 22px; padding: 20px; margin-bottom: 15px; 
            border: 1px solid var(--border); position: relative;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            animation: slideIn 0.4s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .note-item.removing { transform: translateX(-120%); opacity: 0; }

        .badge { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; margin-bottom: 12px; display: inline-block; }
        .note-content { font-size: 17px; color: #fff; line-height: 1.5; word-wrap: break-word; }
        .note-date { font-size: 11px; color: #555; margin-top: 12px; }

        .note-actions { position: absolute; top: 20px; right: 20px; display: flex; gap: 12px; }
        .act-icon { color: #666; cursor: pointer; background: none; border: none; transition: 0.2s; }
        .act-icon:active { transform: scale(0.8); }
        .act-icon.del { color: var(--danger-red); }

        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: white; padding: 10px 20px;
            border-radius: 30px; font-size: 14px; font-weight: 600;
            display: none; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="toast">Copied to clipboard!</div>

    <div class="container">
        <header>
            <div class="logo">MyNotes</div>
            <div class="head-btns">
                <button class="icon-btn-head" onclick="backupData()" title="Backup"><i data-lucide="upload-cloud" size="20"></i></button>
                <div class="icon-btn-head" title="Restore">
                    <i data-lucide="download-cloud" size="20"></i>
                    <input type="file" onchange="restoreData(event)">
                </div>
            </div>
        </header>

        <div class="input-card">
            <div class="tabs" id="inputTabs">
                <button class="tab-btn active" onclick="setCategory(this, 'Personal')">Personal</button>
                <button class="tab-btn" onclick="setCategory(this, 'Work')">Work</button>
                <button class="tab-btn" onclick="setCategory(this, 'Secret')">Secret</button>
            </div>
            <textarea id="noteInput" placeholder="Tulis rencana lo hari ini..."></textarea>
            <div class="input-footer">
                <span class="char-hint" id="charCount">0 karakter</span>
                <button class="save-btn" onclick="saveNote()" id="btnSave">Simpan</button>
            </div>
        </div>

        <div class="search-box">
            <i data-lucide="search" size="18" color="#555"></i>
            <input type="text" class="search-input" id="searchBar" placeholder="Cari catatan..." oninput="renderNotes()">
        </div>

        <div class="filter-bar" id="filterBar"></div>

        <div id="notesList"></div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('notes_db') || '[]');
        let currentCategory = 'Personal';
        let currentFilter = 'Semua';
        let editingId = null;

        lucide.createIcons();

        document.getElementById('noteInput').oninput = function() {
            document.getElementById('charCount').innerText = `${this.value.length} karakter`;
        };

        function setCategory(el, cat) {
            currentCategory = cat;
            document.querySelectorAll('#inputTabs .tab-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
        }

        function setFilter(f) {
            currentFilter = f;
            renderNotes();
        }

        function saveNote() {
            const input = document.getElementById('noteInput');
            const content = input.value.trim();
            if (!content) return;

            if (editingId) {
                const idx = notes.findIndex(n => n.id === editingId);
                notes[idx].content = content;
                notes[idx].category = currentCategory;
                editingId = null;
                document.getElementById('btnSave').innerText = 'Simpan';
            } else {
                const now = new Date();
                const timeStr = now.toLocaleDateString('id-ID', {day:'numeric', month:'short'}) + `, ${now.getHours().toString().padStart(2,'0')}.${now.getMinutes().toString().padStart(2,'0')}`;
                notes.push({ id: Date.now(), content, category: currentCategory, date: timeStr });
            }
            
            input.value = '';
            document.getElementById('charCount').innerText = '0 karakter';
            saveToStorage(); 
            renderNotes();
        }

        function renderNotes() {
            const list = document.getElementById('notesList');
            const filterBar = document.getElementById('filterBar');
            const search = document.getElementById('searchBar').value.toLowerCase();
            
            // RENDER FILTER BAR DENGAN COUNTER
            const categories = ['Semua', 'Personal', 'Work', 'Secret'];
            filterBar.innerHTML = categories.map(cat => {
                const count = (cat === 'Semua') 
                    ? notes.length 
                    : notes.filter(n => n.category === cat).length;
                
                return `
                <div class="pill ${currentFilter === cat ? 'active' : ''}" onclick="setFilter('${cat}')">
                    ${cat} <span>${count}</span>
                </div>`;
            }).join('');

            // FILTER LOGIC
            const filtered = notes.filter(n => {
                const matchCat = currentFilter === 'Semua' || n.category === currentFilter;
                return matchCat && n.content.toLowerCase().includes(search);
            }).reverse();

            if (filtered.length === 0) {
                list.innerHTML = `<div style="text-align:center; color:#555; margin-top:40px; font-size:14px;">kosong, Bro kayak hati ini.</div>`;
            } else {
                list.innerHTML = filtered.map(n => {
                    const config = {
                        Personal: { bg: '#2d1b4e', txt: '#a78bfa' },
                        Work: { bg: '#3e2b0e', txt: '#fbbf24' },
                        Secret: { bg: '#3e1616', txt: '#f87171' }
                    }[n.category];
                    
                    return `
                    <div class="note-item" id="note-${n.id}">
                        <span class="badge" style="background:${config.bg}; color:${config.txt}">${n.category}</span>
                        <div class="note-actions">
                            <button class="act-icon" onclick="editNote(${n.id})"><i data-lucide="edit-3" size="18"></i></button>
                            <button class="act-icon" onclick="copyNote(${n.id})"><i data-lucide="copy" size="18"></i></button>
                            <button class="act-icon del" onclick="confirmDelete(${n.id})"><i data-lucide="trash-2" size="18"></i></button>
                        </div>
                        <div class="note-content">${n.content.replace(/\n/g, '<br>')}</div>
                        <div class="note-date">${n.date}</div>
                    </div>`;
                }).join('');
            }
            lucide.createIcons();
        }

        function editNote(id) {
            const n = notes.find(x => x.id === id);
            editingId = id; 
            const input = document.getElementById('noteInput');
            input.value = n.content;
            input.focus();
            document.getElementById('btnSave').innerText = 'Update';
            window.scrollTo({top: 0, behavior: 'smooth'});
            
            const tabs = document.querySelectorAll('#inputTabs .tab-btn');
            tabs.forEach(t => {
                if(t.innerText === n.category) setCategory(t, n.category);
            });
        }

        function copyNote(id) {
            const n = notes.find(x => x.id === id);
            navigator.clipboard.writeText(n.content);
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function confirmDelete(id) {
            const el = document.getElementById(`note-${id}`);
            el.classList.add('removing');
            setTimeout(() => {
                notes = notes.filter(n => n.id !== id);
                saveToStorage();
                renderNotes();
            }, 400);
        }

        function saveToStorage() { localStorage.setItem('notes_db', JSON.stringify(notes)); }
        
        function backupData() {
            const blob = new Blob([JSON.stringify(notes)], {type:'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_notes_${new Date().getTime()}.json`;
            a.click();
        }

        function restoreData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { 
                try { 
                    const data = JSON.parse(ev.target.result);
                    if(Array.isArray(data)) {
                        notes = data;
                        saveToStorage(); renderNotes();
                        alert('Data di-restore!');
                    }
                } catch(err) { alert('File gak valid!'); }
            };
            reader.readAsText(e.target.files[0]);
        }

        renderNotes();
    </script>
</body>
</html>
