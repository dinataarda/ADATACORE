<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADATACODE_VAULT v1.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-purple: #e11d48; /* Red-Pink Neon */
            --accent-cyan: #22d3ee;
            --bg-dark: #050507;
            --card-glass: rgba(15, 15, 20, 0.9);
            --border-glow: rgba(34, 211, 238, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-dark);
            color: #f1f5f9;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1a0a20 0%, #050507 100%);
        }

        /* --- BACKGROUND ANIMATION --- */
        .scanline {
            width: 100%; height: 100px; z-index: 1;
            background: linear-gradient(to bottom, transparent, rgba(34, 211, 238, 0.05), transparent);
            position: absolute; top: -100px; left: 0;
            animation: scan 4s linear infinite; pointer-events: none;
        }
        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }

        /* --- AUTH SCREEN --- */
        #auth-overlay {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(40px); background: rgba(0,0,0,0.8);
        }

        .auth-card {
            background: var(--card-glass);
            width: 90%; max-width: 400px;
            padding: 60px 30px; border-radius: 40px;
            border: 1px solid var(--border-glow);
            text-align: center; position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 20px rgba(34, 211, 238, 0.05);
        }

        .code-logo {
            font-size: 50px; color: var(--accent-cyan);
            margin-bottom: 25px; display: inline-block;
            filter: drop-shadow(0 0 15px var(--accent-cyan));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .pin-wrapper { position: relative; margin: 40px 0; height: 60px; }
        .pin-dots {
            display: flex; justify-content: center; gap: 25px;
            position: absolute; width: 100%; pointer-events: none; z-index: 2;
        }
        .dot {
            width: 16px; height: 16px; border-radius: 4px;
            border: 2px solid #333; transition: 0.3s; transform: rotate(45deg);
        }
        .dot.active {
            background: var(--accent-cyan); border-color: var(--accent-cyan);
            box-shadow: 0 0 15px var(--accent-cyan); transform: scale(1.2) rotate(45deg);
        }

        #hidden-pin {
            position: absolute; inset: 0; width: 100%; height: 100%;
            opacity: 0; z-index: 5; font-size: 16px; outline: none; border: none;
        }

        /* --- DASHBOARD --- */
        #main-content {
            width: 95%; max-width: 750px; height: 95vh; padding: 25px;
            display: none; flex-direction: column; z-index: 10;
        }

        .nav-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px;
        }
        .nav-logo { font-weight: 800; font-size: 20px; color: var(--accent-cyan); letter-spacing: 2px; }
        .nav-logo i { margin-right: 10px; }

        .input-area {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 30px; padding: 25px; margin-bottom: 30px;
            position: relative; overflow: hidden;
        }

        .cat-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .cat-btn {
            padding: 8px 16px; border-radius: 12px; font-size: 11px; font-weight: 800;
            background: #111; color: #444; border: 1px solid transparent; cursor: pointer;
        }
        .cat-btn.active { background: var(--accent-cyan); color: #000; box-shadow: 0 0 15px var(--accent-cyan); }

        textarea {
            width: 100%; background: transparent; border: none; color: #fff;
            font-family: 'JetBrains Mono'; outline: none; resize: none; min-height: 100px;
            font-size: 15px;
        }

        .btn-commit {
            background: linear-gradient(135deg, var(--accent-cyan), #0891b2);
            color: #000; border: none; padding: 14px 28px; border-radius: 15px;
            font-weight: 800; text-transform: uppercase; font-size: 12px;
            float: right; cursor: pointer; transition: 0.2s;
        }
        .btn-commit:active { transform: scale(0.95); }

        /* Note Cards */
        .filter-nav { display: flex; gap: 20px; padding: 10px; margin-bottom: 20px; overflow-x: auto; }
        .filter-tab { font-size: 13px; font-weight: 700; color: #444; cursor: pointer; position: relative; white-space: nowrap; }
        .filter-tab.active { color: var(--accent-cyan); }
        .filter-tab.active::after {
            content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px; background: var(--accent-cyan);
        }

        .scroll-v { flex: 1; overflow-y: auto; padding-right: 10px; }
        .card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            padding: 25px; border-radius: 25px; margin-bottom: 20px; position: relative;
            animation: fadeInUp 0.5s ease backwards;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } }

        .card-tag { font-size: 10px; background: rgba(34, 211, 238, 0.1); color: var(--accent-cyan); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--accent-cyan); position: absolute; top: 20px; right: 20px; }
        .card-content { line-height: 1.7; color: #cbd5e1; font-size: 15px; margin-top: 15px; }
        .card-footer { font-family: 'JetBrains Mono'; font-size: 10px; color: #334155; margin-top: 20px; display: flex; justify-content: space-between; align-items: center; }

        .trash-icon { color: #334155; cursor: pointer; font-size: 16px; }
        .trash-icon:hover { color: #ef4444; }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <div id="auth-overlay">
        <div class="auth-card">
            <div class="code-logo"><i class="fas fa-code"></i></div>
            <h2 style="letter-spacing: 5px; font-weight: 800; font-size: 22px;">ADATACODE_VAULT</h2>
            <p style="font-size: 11px; color: #64748b; margin-top: 5px; font-family: 'JetBrains Mono';">SECURE HANDSHAKE REQUIRED</p>

            <div class="pin-wrapper">
                <input type="tel" id="hidden-pin" maxlength="4" autocomplete="off" autofocus>
                <div class="pin-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>

            <p id="status" style="font-size: 12px; font-weight: bold; color: var(--accent-cyan); opacity: 0.6;">[ WAITING FOR KEY ]</p>
        </div>
    </div>

    <div id="main-content">
        <div class="nav-header">
            <div class="nav-logo"><i class="fas fa-terminal"></i>ADATACODE_VAULT</div>
            <i class="fas fa-power-off" onclick="location.reload()" style="cursor:pointer; color:#1e293b;"></i>
        </div>

        <div class="input-area">
            <div class="cat-group" id="save-cat">
                <div class="cat-btn active" data-val="Personal">Personal</div>
                <div class="cat-btn" data-val="Work">Work</div>
                <div class="cat-btn" data-val="Secret">Secret</div>
            </div>
            <textarea id="note-text" placeholder="Start typing encrypted log..."></textarea>
            <div style="overflow: hidden; width: 100%;">
                <button class="btn-commit" onclick="saveEntry()">Commit Log</button>
            </div>
        </div>

        <div class="filter-nav" id="filter-bar">
            <div class="filter-tab active" data-f="All">All Entry</div>
            <div class="filter-tab" data-f="Personal">Personal</div>
            <div class="filter-tab" data-f="Work">Work</div>
            <div class="filter-tab" data-f="Secret">Secret</div>
        </div>

        <div class="scroll-v" id="logs-container"></div>
    </div>

    <script>
        const ACCESS_KEY = "1083";
        let entryCat = "Personal";
        let activeF = "All";

        const input = document.getElementById('hidden-pin');
        const dots = document.querySelectorAll('.dot');
        const status = document.getElementById('status');

        // Keyboard & PIN Logic
        input.addEventListener('input', (e) => {
            const val = e.target.value;
            dots.forEach((dot, i) => dot.classList.toggle('active', i < val.length));

            if (val.length === 4) {
                if (val === ACCESS_KEY) {
                    status.innerText = "ACCESS GRANTED";
                    status.style.color = "#22d3ee";
                    setTimeout(unlock, 600);
                } else {
                    status.innerText = "HANDSHAKE FAILED";
                    status.style.color = "#f43f5e";
                    input.value = "";
                    setTimeout(() => {
                        dots.forEach(d => d.classList.remove('active'));
                        status.innerText = "[ WAITING FOR KEY ]";
                        status.style.color = "#22d3ee";
                    }, 1000);
                }
            }
        });

        function unlock() {
            document.getElementById('auth-overlay').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('auth-overlay').style.display = "none";
                document.getElementById('main-content').style.display = "flex";
                render();
            }, 500);
        }

        // Selector & Filter
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                entryCat = btn.dataset.val;
            }
        });

        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                activeF = tab.dataset.f;
                render();
            }
        });

        // CRUD
        function saveEntry() {
            const txt = document.getElementById('note-text').value;
            if(!txt.trim()) return;

            const db = JSON.parse(localStorage.getItem('adata_v5_db') || '[]');
            db.unshift({
                id: Date.now(),
                content: txt,
                cat: entryCat,
                time: new Date().toLocaleString('id-ID')
            });

            localStorage.setItem('adata_v5_db', JSON.stringify(db));
            document.getElementById('note-text').value = "";
            render();
        }

        function render() {
            const db = JSON.parse(localStorage.getItem('adata_v5_db') || '[]');
            const container = document.getElementById('logs-container');
            const filtered = activeF === "All" ? db : db.filter(x => x.cat === activeF);

            container.innerHTML = filtered.map((item, idx) => `
                <div class="card" style="animation-delay: ${idx * 0.1}s">
                    <span class="card-tag">${item.cat}</span>
                    <p class="card-content">${item.content}</p>
                    <div class="card-footer">
                        <span>> TS: ${item.time}</span>
                        <i class="fas fa-trash-alt trash-icon" onclick="deleteEntry(${item.id})"></i>
                    </div>
                </div>
            `).join('');
        }

        function deleteEntry(id) {
            let db = JSON.parse(localStorage.getItem('adata_v5_db') || '[]');
            db = db.filter(i => i.id !== id);
            localStorage.setItem('adata_v5_db', JSON.stringify(db));
            render();
        }

        // Focus helper
        document.body.onclick = () => { if(document.getElementById('auth-overlay').style.display !== 'none') input.focus(); }
    </script>
</body>
</html>
