<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyNotes - Premium Log</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            /* OLED Minimalist Palette */
            --bg-dark: #000000;
            --surface: #1C1C1E;
            --surface-hover: #2C2C2E;
            --surface-light: #3A3A3C;
            --text: #FFFFFF;
            --text-secondary: #EBEBF5;
            --muted: #8E8E93;
            --primary: #0A84FF;
            --primary-glow: rgba(10, 132, 255, 0.3);
            --personal: #5E5CE6;
            --work: #FF9F0A;
            --secret: #FF453A;
            --border-radius: 20px;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: '-apple-system', 'SF Pro Text', 'Inter', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            line-height: 1.5;
            padding-bottom: 110px;
            min-height: 100vh;
            overflow-x: hidden;
            letter-spacing: -0.01em;
        }

        /* --- ANIMATIONS --- */
        @keyframes popInFade {
            0% { opacity: 0; transform: translateY(15px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes slideOutRight {
            0% { opacity: 1; transform: translateX(0); }
            100% { opacity: 0; transform: translateX(100px); }
        }

        @keyframes pulseCheck {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        header {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        header div:first-child {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
        }

        .header-btns button {
            background: var(--surface);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .header-btns button:active { transform: scale(0.9); }

        .composer {
            background: var(--surface);
            margin: 20px 16px;
            border-radius: var(--border-radius);
            padding: 18px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .composer:focus-within {
            box-shadow: 0 0 0 2px var(--primary);
            transform: translateY(-2px);
        }

        .comp-top { display: flex; gap: 8px; margin-bottom: 12px; }

        .chip {
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: var(--surface-light);
            color: var(--text-secondary);
            transition: 0.2s ease;
            border: 1px solid transparent;
        }

        .chip.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 15px;
            min-height: 70px;
            resize: none;
            margin-top: 5px;
            line-height: 1.6;
        }

        textarea::placeholder { color: var(--muted); }

        .composer-foot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        button.btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button.btn-primary:active { transform: scale(0.96); opacity: 0.8; }

        .search-box { margin: 0 16px 16px; position: relative; }
        .search-box input {
            width: 100%;
            background: var(--surface);
            border: none;
            padding: 14px 16px 14px 40px;
            border-radius: 16px;
            color: var(--text);
            font-size: 15px;
            transition: 0.2s;
        }
        .search-box input:focus { background: var(--surface-hover); }
        .search-box i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); }

        .filters {
            padding: 0 16px 16px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .filter-btn {
            padding: 8px 16px;
            background: var(--surface);
            color: var(--muted);
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            transition: 0.2s;
            cursor: pointer;
        }
        .filter-btn.active {
            background: var(--text);
            color: var(--bg-dark);
            font-weight: 600;
        }

        /* Logs List */
        .note-card {
            background: var(--surface);
            border-radius: var(--border-radius);
            padding: 18px;
            margin: 0 16px 12px;
            position: relative;
            opacity: 0; /* Untuk start animasi */
            animation: popInFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: 0.2s ease;
        }
        
        .note-card:active { transform: scale(0.98); }

        .note-category {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        .note-personal { color: var(--personal); background: rgba(94, 92, 230, 0.1); }
        .note-work     { color: var(--work); background: rgba(255, 159, 10, 0.1); }
        .note-secret   { color: var(--secret); background: rgba(255, 69, 58, 0.1); }

        .note-text { font-size: 15px; color: var(--text-secondary); margin-bottom: 12px; line-height: 1.5; }
        .note-time { font-size: 12px; color: var(--muted); font-weight: 500;}

        .note-actions {
            position: absolute; top: 18px; right: 18px;
            display: flex; gap: 16px; color: var(--muted);
        }
        
        .note-actions i { padding: 4px; cursor: pointer; transition: color 0.2s; font-size: 16px;}
        .note-actions i:active { color: var(--text); }
        .note-actions .fa-check { color: var(--primary); animation: pulseCheck 0.3s ease; }

        /* Bottom Bar */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-around;
            padding: 12px 0 28px;
            z-index: 100;
        }
        .nav-item { text-align: center; color: var(--muted); font-size: 11px; font-weight: 500; cursor: pointer; width: 60px; transition: 0.2s;}
        .nav-item:active { transform: scale(0.9); }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; display: block; }

        /* Modal */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(4px);
            padding: 20px;
        }
        .modal-content {
            background: var(--surface); width: 100%; max-width: 360px; 
            border-radius: 24px; padding: 24px;
            transform: scale(0.95); opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .modal.show { display: flex; }
        .modal.show .modal-content { transform: scale(1); opacity: 1; }

        .toast {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text); color: var(--bg-dark);
            padding: 12px 24px; border-radius: 30px;
            font-weight: 600; font-size: 14px;
            opacity: 0; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 2000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <header>
        <div>MyNotes</div>
        <div class="header-btns" style="display:flex; gap:8px;">
            <button onclick="showStats()"><i class="fas fa-chart-pie"></i></button>
            <button onclick="exportData()"><i class="fas fa-file-export"></i></button>
        </div>
    </header>

    <div class="composer">
        <div class="comp-top">
            <div class="chip active" data-cat="Personal" onclick="selectCategory(this)">Personal</div>
            <div class="chip" data-cat="Work" onclick="selectCategory(this)">Work</div>
            <div class="chip" data-cat="Secret" onclick="selectCategory(this)">Secret</div>
        </div>
        <textarea id="note-txt" placeholder="Ketik sesuatu..." oninput="autoResize(this)"></textarea>

        <div class="composer-foot">
            <span id="char-ct" style="font-size:12px; color:var(--muted)">0 karakter</span>
            <button class="btn-primary" onclick="saveEntry()">Simpan</button>
        </div>
    </div>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="search-in" placeholder="Cari data..." oninput="renderLogs()">
    </div>

    <div class="filters">
        <div class="filter-btn active" data-f="All" onclick="setFilter(this)">Semua <span id="count-all" style="opacity:0.6; margin-left:4px;">0</span></div>
        <div class="filter-btn" data-f="Personal" onclick="setFilter(this)">Personal</div>
        <div class="filter-btn" data-f="Work" onclick="setFilter(this)">Work</div>
        <div class="filter-btn" data-f="Secret" onclick="setFilter(this)">Secret</div>
    </div>

    <div id="logs-list"></div>

    <div class="bottom-bar">
        <div class="nav-item active"><i class="fas fa-layer-group"></i><div>Vault</div></div>
        <div class="nav-item" onclick="document.getElementById('import-file').click()"><i class="fas fa-cloud-download-alt"></i><div>Restore</div></div>
    </div>

    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    <div id="toast" class="toast"></div>

    <div class="modal" id="stats-modal" onclick="if(event.target==this) closeStats()">
        <div class="modal-content">
            <h3 style="margin-bottom:20px; font-weight:700; text-align:center;">Vault Status</h3>
            <div style="display:flex; flex-direction:column; gap:16px; background:var(--bg-dark); padding:20px; border-radius:16px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="color:var(--muted); font-size:14px;">Total Memori</span>
                    <b id="stat-total" style="color:var(--text); font-size:18px;">0</b>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="color:var(--muted); font-size:14px;">Ukuran Data</span>
                    <b id="stat-size" style="color:var(--text); font-size:18px;">0 KB</b>
                </div>
            </div>
            <div style="margin-top:24px; display:flex; gap:10px;">
                <button class="btn-primary" onclick="clearAll()" style="flex:1; background:var(--surface-light); color:#FF453A;">Format</button>
                <button class="btn-primary" onclick="closeStats()" style="flex:1;">Tutup</button>
            </div>
        </div>
    </div>

<script>
const DB_NAME = "indigo_vault_db";
let currentFilter = "All";
let currentCategory = "Personal";

const getDB = () => JSON.parse(localStorage.getItem(DB_NAME) || "[]");
const saveDB = (data) => localStorage.setItem(DB_NAME, JSON.stringify(data));

function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 4); }

function selectCategory(el) {
    document.querySelectorAll('.comp-top .chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    currentCategory = el.dataset.cat;
}

function autoResize(textarea) {
    textarea.style.height = 'auto';
    textarea.style.height = textarea.scrollHeight + 'px';
    document.getElementById('char-ct').textContent = `${textarea.value.length} karakter`;
}

function saveEntry() {
    const ta = document.getElementById("note-txt");
    const txt = ta.value.trim();
    if (!txt) return;

    const db = getDB();
    db.unshift({
        id: uid(),
        content: txt,
        cat: currentCategory,
        ts: Date.now(),
        time: new Date().toLocaleString('id-ID', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })
    });
    saveDB(db);
    ta.value = "";
    ta.style.height = 'auto'; // Reset height
    document.getElementById('char-ct').textContent = `0 karakter`;
    renderLogs();
    updateCounters();
    toast("Tersimpan di vault");
}

function renderLogs() {
    const db = getDB();
    const container = document.getElementById("logs-list");
    const query = document.getElementById("search-in").value.toLowerCase();

    let items = currentFilter === "All" ? db : db.filter(item => item.cat === currentFilter);
    if (query) items = items.filter(item => item.content.toLowerCase().includes(query));

    if (items.length === 0) {
        container.innerHTML = `<div style="text-align:center; color:var(--muted); padding:60px 20px; font-size:14px; animation: popInFade 0.4s forwards;">Tidak ada data ditemukan.</div>`;
        return;
    }

    container.innerHTML = items.map((item, idx) => `
        <div class="note-card" id="note-${item.id}" style="animation-delay: ${idx * 0.05}s">
            <div class="note-category note-${item.cat.toLowerCase()}">${item.cat}</div>
            <div class="note-actions">
                <i class="far fa-copy" onclick="copyEntry('${item.id}', this)"></i>
                <i class="far fa-trash-alt" onclick="deleteEntry('${item.id}')" style="color:var(--secret)"></i>
            </div>
            <div class="note-text">${item.content.replace(/\n/g, '<br>')}</div>
            <div class="note-time">${item.time}</div>
        </div>
    `).join("");
}

// FITUR BARU: Animasi Hapus Slide Out
function deleteEntry(id) {
    if (!confirm("Hapus memori ini secara permanen?")) return;
    
    const card = document.getElementById(`note-${id}`);
    if (card) {
        card.style.animation = "slideOutRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards";
        
        // Tunggu animasi selesai baru update database & render ulang
        setTimeout(() => {
            saveDB(getDB().filter(x => x.id !== id));
            renderLogs();
            updateCounters();
            toast("Dihapus");
        }, 300);
    } else {
        saveDB(getDB().filter(x => x.id !== id));
        renderLogs();
        updateCounters();
    }
}

// FITUR BARU: Animasi Icon Morph saat Copy
function copyEntry(id, iconEl) {
    const item = getDB().find(x => x.id === id);
    if (item) {
        navigator.clipboard.writeText(item.content).then(() => {
            // Ubah icon jadi checkmark
            iconEl.classList.remove('fa-copy');
            iconEl.classList.remove('far');
            iconEl.classList.add('fas');
            iconEl.classList.add('fa-check');
            
            toast("Teks disalin");

            // Balikin ke icon semula setelah 1.5 detik
            setTimeout(() => {
                iconEl.classList.remove('fa-check');
                iconEl.classList.remove('fas');
                iconEl.classList.add('far');
                iconEl.classList.add('fa-copy');
            }, 1500);
        });
    }
}

function setFilter(el) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentFilter = el.dataset.f;
    // Efek refresh container sebelum render ulang buat nge-trigger animasi
    document.getElementById("logs-list").innerHTML = ""; 
    setTimeout(() => { renderLogs(); }, 10);
}

function updateCounters() {
    document.getElementById('count-all').textContent = getDB().length;
}

let toastTimeout;
function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => t.classList.remove("show"), 2000);
}

function showStats() {
    const modal = document.getElementById("stats-modal");
    document.getElementById("stat-total").textContent = getDB().length;
    const size = new Blob([localStorage.getItem(DB_NAME) || ""]).size;
    document.getElementById("stat-size").textContent = (size / 1024).toFixed(1) + " KB";
    modal.style.display = "flex";
    setTimeout(() => modal.classList.add("show"), 10);
}

function closeStats() {
    const modal = document.getElementById("stats-modal");
    modal.classList.remove("show");
    setTimeout(() => modal.style.display = "none", 300);
}

function exportData() {
    const db = getDB();
    if (!db.length) return toast("Vault kosong");
    const blob = new Blob([JSON.stringify(db, null, 2)], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `vault_backup_${Date.now()}.json`;
    a.click();
    toast("Backup berhasil diunduh");
}

function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        try {
            saveDB(JSON.parse(ev.target.result));
            renderLogs(); updateCounters();
            toast("Restorasi berhasil");
        } catch(err) { toast("File tidak valid"); }
    };
    reader.readAsText(file);
}

function clearAll() {
    if (confirm("Yakin ingin menghapus SEMUA data? Ini tidak bisa dibatalkan.")) {
        localStorage.removeItem(DB_NAME);
        renderLogs(); updateCounters(); closeStats();
        toast("Vault dikosongkan");
    }
}

window.onload = () => { renderLogs(); updateCounters(); };
</script>
</body>
</html>
