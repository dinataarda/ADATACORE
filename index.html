<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyNotes Pro - Fixed</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-body: #000000;
            --bg-card: #121212;
            --accent: #007aff; 
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --border: #27272a;
            --danger-red: #b91c1c; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-body); color: var(--text-main); padding: 15px; }
        .container { max-width: 450px; margin: 0 auto; }

        /* --- FIX HEADER --- */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-top: 10px; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .head-btns { display: flex; gap: 8px; }
        
        .icon-btn-head { 
            background: #1a1a1a; border: 1px solid var(--border); width: 40px; height: 40px; 
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: white; cursor: pointer; position: relative; overflow: hidden;
            transition: 0.2s;
        }
        .icon-btn-head input { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        .icon-btn-head:active { transform: scale(0.9); background: #222; }

        /* INPUT CARD */
        .input-card { 
            background: var(--bg-card); border-radius: 24px; padding: 20px; margin-bottom: 25px; 
            border: 2px solid var(--accent); transition: 0.3s;
        }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { 
            background: #262626; border: none; color: #888; padding: 8px 18px; 
            border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .tab-btn.active { background: var(--accent); color: white; }

        textarea { 
            background: transparent; border: none; width: 100%; height: 80px; 
            color: white; font-size: 18px; outline: none; resize: none;
        }
        
        .input-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222; padding-top: 15px; margin-top: 10px;}
        .char-hint { font-size: 12px; color: #555; }
        .save-btn { background: var(--accent); color: white; border: none; padding: 10px 28px; border-radius: 22px; font-weight: 700; cursor: pointer; }

        /* SEARCH BOX */
        .search-box { 
            background: var(--bg-card); border-radius: 18px; display: flex; align-items: center; 
            padding: 0 15px; margin-bottom: 20px; border: 1px solid var(--accent); /* Warna biru biar sinkron */
        }
        .search-input { flex: 1; background: transparent; border: none; padding: 14px 0; color: white; outline: none; margin-left: 10px; font-size: 15px; }
        
        /* FILTER BAR */
        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .pill { 
            background: #1a1a1a; border: 1px solid var(--border); color: var(--text-dim); 
            padding: 10px 22px; border-radius: 25px; white-space: nowrap; font-size: 14px; font-weight: 600; 
        }
        .pill.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* LIST NOTE ANIMATION */
        .note-item { 
            background: var(--bg-card); border-radius: 22px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border);
            position: relative; animation: slideUp 0.4s ease-out forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .badge { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; margin-bottom: 12px; display: inline-block; }
        .note-content { font-size: 18px; color: #fff; font-weight: 500; line-height: 1.4; }
        .note-date { font-size: 12px; color: #444; margin-top: 12px; }

        .note-actions { position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; }
        .act-icon { color: #666; cursor: pointer; background: none; border: none; }
        .act-icon.del { color: var(--danger-red); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">MyNotes</div>
            <div class="head-btns">
                <button class="icon-btn-head" onclick="backupData()"><i data-lucide="upload-cloud" size="20"></i></button>
                <div class="icon-btn-head">
                    <i data-lucide="download-cloud" size="20"></i>
                    <input type="file" onchange="restoreData(event)">
                </div>
            </div>
        </header>

        <div class="input-card">
            <div class="tabs" id="inputTabs">
                <button class="tab-btn active" onclick="setCategory(this, 'Personal')">Personal</button>
                <button class="tab-btn" onclick="setCategory(this, 'Work')">Work</button>
                <button class="tab-btn" onclick="setCategory(this, 'Secret')">Secret</button>
            </div>
            <textarea id="noteInput" placeholder="Ketik sesuatu..."></textarea>
            <div class="input-footer">
                <span class="char-hint" id="charCount">0 karakter</span>
                <button class="save-btn" onclick="saveNote()" id="btnSave">Simpan</button>
            </div>
        </div>

        <div class="search-box">
            <i data-lucide="search" size="18" color="#555"></i>
            <input type="text" class="search-input" id="searchBar" placeholder="Cari data..." oninput="renderNotes()">
        </div>

        <div class="filter-bar" id="filterBar">
            <div class="pill active" onclick="setFilter('Semua')">Semua <span id="countAll" style="font-size:11px; opacity:0.7">0</span></div>
            <div class="pill" onclick="setFilter('Personal')">Personal</div>
            <div class="pill" onclick="setFilter('Work')">Work</div>
            <div class="pill" onclick="setFilter('Secret')">Secret</div>
        </div>

        <div id="notesList"></div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('notes_db') || '[]');
        let currentCategory = 'Personal';
        let currentFilter = 'Semua';
        let editingId = null;

        lucide.createIcons();
        document.getElementById('noteInput').oninput = function() {
            document.getElementById('charCount').innerText = `${this.value.length} karakter`;
        };

        function setCategory(el, cat) {
            currentCategory = cat;
            document.querySelectorAll('#inputTabs .tab-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('#filterBar .pill').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.includes(f));
            });
            renderNotes();
        }

        function saveNote() {
            const content = document.getElementById('noteInput').value.trim();
            if (!content) return;
            if (editingId) {
                const idx = notes.findIndex(n => n.id === editingId);
                notes[idx].content = content;
                notes[idx].category = currentCategory;
                editingId = null;
                document.getElementById('btnSave').innerText = 'Simpan';
            } else {
                const now = new Date();
                const timeStr = now.toLocaleDateString('id-ID', {day:'numeric', month:'short'}) + `, ${now.getHours()}.${now.getMinutes().toString().padStart(2,'0')}`;
                notes.push({ id: Date.now(), content, category: currentCategory, date: timeStr });
            }
            document.getElementById('noteInput').value = '';
            document.getElementById('charCount').innerText = '0 karakter';
            saveToStorage(); renderNotes();
        }

        function renderNotes() {
            const list = document.getElementById('notesList');
            const search = document.getElementById('searchBar').value.toLowerCase();
            document.getElementById('countAll').innerText = notes.length;
            
            const filtered = notes.filter(n => {
                const matchCat = currentFilter === 'Semua' || n.category === currentFilter;
                return matchCat && n.content.toLowerCase().includes(search);
            }).reverse();

            list.innerHTML = filtered.map(n => {
                const badgeColor = n.category === 'Personal' ? '#2d1b4e' : (n.category === 'Work' ? '#3e2b0e' : '#3e1616');
                const textColor = n.category === 'Personal' ? '#a78bfa' : (n.category === 'Work' ? '#fbbf24' : '#f87171');
                
                return `
                <div class="note-item">
                    <span class="badge" style="background:${badgeColor}; color:${textColor}">${n.category}</span>
                    <div class="note-actions">
                        <button class="act-icon" onclick="editNote(${n.id})"><i data-lucide="edit-3" size="18"></i></button>
                        <button class="act-icon" onclick="copyNote(\`${n.content.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)"><i data-lucide="copy" size="18"></i></button>
                        <button class="act-icon del" onclick="deleteNote(${n.id})"><i data-lucide="trash-2" size="18"></i></button>
                    </div>
                    <div class="note-content">${n.content}</div>
                    <div class="note-date">${n.date}</div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function editNote(id) {
            const n = notes.find(x => x.id === id);
            editingId = id; 
            document.getElementById('noteInput').value = n.content;
            document.getElementById('btnSave').innerText = 'Update';
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function copyNote(t) { navigator.clipboard.writeText(t); alert('Copied!'); }
        function deleteNote(id) { if(confirm('Hapus?')) { notes = notes.filter(n => n.id !== id); saveToStorage(); renderNotes(); } }
        function saveToStorage() { localStorage.setItem('notes_db', JSON.stringify(notes)); }
        function backupData() {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(notes)], {type:'application/json'}));
            a.download = `notes_backup.json`; a.click();
        }
        function restoreData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { 
                try { notes = JSON.parse(ev.target.result); saveToStorage(); renderNotes(); alert('Success!'); } 
                catch(e) { alert('Error!'); }
            };
            reader.readAsText(e.target.files[0]);
        }
        renderNotes();
    </script>
</body>
</html>
